name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - name: Install dependencies
        run: uv sync --group lint
      - name: Lint
        run: uv run ruff check iep/
      - name: Format
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - name: Install dependencies
        run: uv sync --group typecheck
      - name: Type check
        run: uv run ty check iep/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
      - name: Install dependencies
        run: uv sync --group test
      - name: Test
        run: uv run pytest

